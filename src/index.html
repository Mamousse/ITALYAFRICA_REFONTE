<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>ITALYAFRICA - Cabinet Juridique International</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <meta name="keywords" content="cabinet juridique, italie, afrique, droit des affaires, conseil juridique, investissement afrique, avocat international">
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://italyafrica.com/">
  <meta property="twitter:title" content="ITALYAFRICA - Cabinet Juridique International">
  <meta property="twitter:description" content="Accompagnement juridique et stratégique pour vos projets entre l'Italie et l'Afrique.">
  <meta property="twitter:image" content="/LOGO-ITALYAFRICA.png">

  <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
  <link rel="preload" href="/assets/fonts/inter/inter-variable.woff2" as="font" type="font/woff2" crossorigin="anonymous">
  <link rel="preload" href="/assets/fonts/playfair-display/playfair-display-variable.woff2" as="font" type="font/woff2" crossorigin="anonymous">
  <link rel="preload" href="/assets/fonts/playfair-display/playfair-display-italic-variable.woff2" as="font" type="font/woff2" crossorigin="anonymous">
  <link rel="preload" href="/justice-law.jpg" as="image">
  <style>
    @font-face {
      font-family: 'Inter';
      font-style: normal;
      font-weight: 300 700;
      font-display: swap;
      src: url('/assets/fonts/inter/inter-variable.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Playfair Display';
      font-style: normal;
      font-weight: 400 700;
      font-display: swap;
      src: url('/assets/fonts/playfair-display/playfair-display-variable.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Playfair Display';
      font-style: italic;
      font-weight: 400 700;
      font-display: swap;
      src: url('/assets/fonts/playfair-display/playfair-display-italic-variable.woff2') format('woff2');
    }
    /* Critical CSS — prevents FOUC before Tailwind loads */
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', system-ui, sans-serif;
      background-color: #f0ede6;
      color: #1a3a2e;
      overflow-x: hidden;
    }
    h1, h2, h3, h4, h5, h6 {
      font-family: 'Playfair Display', Georgia, serif;
      color: #1a3a2e;
    }
    app-root {
      display: block;
      min-height: 100vh;
      background-color: #f0ede6;
    }
    /* Navbar toujours fixée et visible correctement dès le premier rendu */
    app-navbar nav {
      position: fixed;
      left: 0;
      right: 0;
      top: 0;
      z-index: 50;
      background-color: #ffffff;
      box-shadow: 0 1px 3px 0 rgba(0,0,0,0.08);
      padding-top: 1.25rem;
      padding-bottom: 1.25rem;
    }
  </style>
</head>
<body>
  <div id="global-loader">
    <div class="initial-loader">
      <div class="loader-content">
        <div class="logo-placeholder">
          <div class="spinner"></div>
        </div>
        <p class="loader-text">ITALYAFRICA</p>
        <div class="loader-bar">
          <div class="loader-progress"></div>
        </div>
      </div>
    </div>
  </div>
  
  <style>
    #global-loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background-color: #f0ede6;
      transition: opacity 0.8s ease-out, visibility 0.8s;
    }
    #global-loader.fade-out {
      opacity: 0;
      visibility: hidden;
    }
    .initial-loader {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .loader-content {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }
    .loader-text {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      color: #1a3a2e;
      margin: 0;
      animation: pulse 2s infinite ease-in-out;
    }
    .spinner {
      width: 60px;
      height: 60px;
      border: 3px solid rgba(26, 58, 46, 0.1);
      border-top: 3px solid #b38e2d;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    .loader-bar {
      width: 120px;
      height: 2px;
      background: rgba(26, 58, 46, 0.1);
      border-radius: 2px;
      overflow: hidden;
    }
    .loader-progress {
      width: 100%;
      height: 100%;
      background: #b38e2d;
      animation: progress 2s infinite ease-in-out;
      transform-origin: left;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    @keyframes progress {
      0% { transform: scaleX(0); }
      50% { transform: scaleX(1); }
      100% { transform: scaleX(0); transform-origin: right; }
    }
  </style>

  <app-root></app-root>
</body>
</html>
